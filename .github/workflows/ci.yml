name: CI

on:
  push:
    branches: [master, "v*-updates"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks (syntax + IPC channel wiring)
        run: node test/static-checks.js

      - name: Smoke tests (boot renderer, tabs, trackers, defects, one-page CHP 108 PDF)
        run: npx electron test/smoke.js
